name: Validate skill

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Validate package
        run: python3 skills/buffett-investment-framework/scripts/framework.py validate
      - name: Compile runtime
        run: python3 -m py_compile skills/buffett-investment-framework/scripts/framework.py
